<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bank Rate Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 简单样式（可删） -->
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0px;
        background: #f6f7f9;
        color: #111;
      }

      /* Dark Mode */
      @media (prefers-color-scheme: dark) {
        body {
          background: #121212;
          color: #eee;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar"></div>
      <div id="currency-panel"></div>
      <canvas style="max-height: 600px" id="chart"></canvas>
      <div id="notes"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/init.js"></script>
  </body>
</html>
